{{- if .Values.ingress.enabled }}

apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: {{ include "springboot-demo.fullname" . }}

spec:

  ingressClassName: nginx

  rules:

  - host: {{ .Values.ingress.host }}

    http:

      paths:

      - path: /

        pathType: Prefix

        backend:

          service:

            name: {{ include "springboot-demo.fullname" . }}

            port:

              number: {{ .Values.service.port }}

{{- end }}