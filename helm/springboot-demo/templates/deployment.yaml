apiVersion: apps/v1
kind: Deployment

metadata:
  name: {{ include "springboot-demo.fullname" . }}

spec:

  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: {{ include "springboot-demo.name" . }}

  template:

    metadata:
      labels:
        app: {{ include "springboot-demo.name" . }}

    spec:

      containers:

      - name: springboot-demo

        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"

        ports:
        - containerPort: {{ .Values.containerPort }}